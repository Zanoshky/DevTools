    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100..800&family=Source+Code+Pro:wght@300..900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Theme initialization (before React renders) -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('dev-toolbox-appearance') || 'null');
        var mode = s && s.mode;
        var accent = s && s.accent;
        var font = s && s.font;
        var radius = s && s.radius;
        if (!mode) {
          var old = localStorage.getItem('theme');
          mode = old === 'dark' ? 'dark' : old === 'light' ? 'light' : 'system';
        }
        var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        if (accent && accent !== 'blue') document.documentElement.classList.add('theme-' + accent);
        if (font === 'inter' || font === 'system' || font === 'mono') font = 'jetbrains-mono';
        if (font) document.documentElement.classList.add('font-' + font);
        else document.documentElement.classList.add('font-jetbrains-mono');
        if (radius) document.documentElement.style.setProperty('--radius', radius + 'rem');
      } catch (e) {}
    </script>
  </head>
  <body class="font-sans">
